<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#145D2F"/>
      <stop offset="100%" style="stop-color:#1B7A3D"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E8720C"/>
      <stop offset="100%" style="stop-color:#C45F0A"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.1)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Decorative circles -->
  <circle cx="1050" cy="80" r="200" fill="rgba(255,255,255,0.03)"/>
  <circle cx="150" cy="550" r="250" fill="rgba(232,114,12,0.05)"/>
  <circle cx="900" cy="500" r="150" fill="rgba(255,255,255,0.02)"/>
  
  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="6" fill="url(#accent)"/>
  
  <!-- Tunisia flag (simplified) -->
  <g transform="translate(80, 50)">
    <circle cx="30" cy="30" r="30" fill="#E70013"/>
    <circle cx="30" cy="30" r="22" fill="#fff"/>
    <circle cx="30" cy="30" r="16" fill="#E70013"/>
    <polygon points="30,14 33.5,25 45,25 36,32 39,43 30,36 21,43 24,32 15,25 26.5,25" fill="#fff" transform="translate(2,-1) scale(0.7)"/>
    <circle cx="30" cy="30" r="6" fill="#fff"/>
  </g>
  
  <!-- Logo area -->
  <g transform="translate(80, 120)">
    <text x="0" y="0" fill="#fff" font-family="Arial, Helvetica, sans-serif" font-size="52" font-weight="900" letter-spacing="6">SORETRAK</text>
  </g>
  
  <!-- Company name Arabic -->
  <text x="80" y="210" fill="rgba(255,255,255,0.9)" font-family="Arial, Helvetica, sans-serif" font-size="28" direction="rtl">الشركة الجهوية للنقل بالقيروان</text>
  
  <!-- Company name French -->
  <text x="80" y="255" fill="rgba(255,255,255,0.7)" font-family="Arial, Helvetica, sans-serif" font-size="20">Société Régionale de Transport de Kairouan</text>
  
  <!-- Divider line -->
  <rect x="80" y="280" width="200" height="4" rx="2" fill="url(#accent)"/>
  
  <!-- Description Arabic -->
  <text x="80" y="330" fill="rgba(255,255,255,0.85)" font-family="Arial, Helvetica, sans-serif" font-size="22">خدمات نقل آمنة وموثوقة تربط القيروان بجميع أنحاء تونس</text>
  <text x="80" y="365" fill="rgba(255,255,255,0.85)" font-family="Arial, Helvetica, sans-serif" font-size="22">رحلات مريحة بأسعار مناسبة للجميع</text>
  
  <!-- Stats row -->
  <g transform="translate(80, 420)">
    <!-- Buses -->
    <g>
      <rect x="0" y="0" width="160" height="80" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
      <text x="80" y="35" fill="#E8720C" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="900" text-anchor="middle">200+</text>
      <text x="80" y="60" fill="rgba(255,255,255,0.7)" font-family="Arial, Helvetica, sans-serif" font-size="13" text-anchor="middle">حافلة / Bus</text>
    </g>
    <!-- Routes -->
    <g transform="translate(180, 0)">
      <rect x="0" y="0" width="160" height="80" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
      <text x="80" y="35" fill="#E8720C" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="900" text-anchor="middle">50+</text>
      <text x="80" y="60" fill="rgba(255,255,255,0.7)" font-family="Arial, Helvetica, sans-serif" font-size="13" text-anchor="middle">خط / Lignes</text>
    </g>
    <!-- Passengers -->
    <g transform="translate(360, 0)">
      <rect x="0" y="0" width="160" height="80" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
      <text x="80" y="35" fill="#E8720C" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="900" text-anchor="middle">10K+</text>
      <text x="80" y="60" fill="rgba(255,255,255,0.7)" font-family="Arial, Helvetica, sans-serif" font-size="13" text-anchor="middle">راكب يومياً</text>
    </g>
    <!-- Years -->
    <g transform="translate(540, 0)">
      <rect x="0" y="0" width="160" height="80" rx="12" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
      <text x="80" y="35" fill="#E8720C" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="900" text-anchor="middle">30+</text>
      <text x="80" y="60" fill="rgba(255,255,255,0.7)" font-family="Arial, Helvetica, sans-serif" font-size="13" text-anchor="middle">سنة خبرة</text>
    </g>
  </g>
  
  <!-- Bus icon area (right side) -->
  <g transform="translate(920, 180)">
    <rect x="0" y="0" width="200" height="280" rx="20" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <!-- Simplified bus -->
    <g transform="translate(40, 40)">
      <rect x="0" y="30" width="120" height="80" rx="15" fill="rgba(232,114,12,0.8)"/>
      <rect x="10" y="15" width="100" height="30" rx="8" fill="rgba(255,255,255,0.3)"/>
      <rect x="15" y="50" width="25" height="20" rx="4" fill="rgba(255,255,255,0.5)"/>
      <rect x="50" y="50" width="25" height="20" rx="4" fill="rgba(255,255,255,0.5)"/>
      <rect x="85" y="50" width="25" height="20" rx="4" fill="rgba(255,255,255,0.5)"/>
      <circle cx="30" cy="120" r="14" fill="#333"/>
      <circle cx="30" cy="120" r="7" fill="#666"/>
      <circle cx="90" cy="120" r="14" fill="#333"/>
      <circle cx="90" cy="120" r="7" fill="#666"/>
      <rect x="5" y="35" width="8" height="5" rx="2" fill="#FFD700"/>
      <rect x="107" y="35" width="8" height="5" rx="2" fill="#FF3333"/>
    </g>
    <!-- Routes text -->
    <text x="100" y="170" fill="rgba(255,255,255,0.6)" font-family="Arial, Helvetica, sans-serif" font-size="14" text-anchor="middle">القيروان ← تونس</text>
    <text x="100" y="195" fill="rgba(255,255,255,0.6)" font-family="Arial, Helvetica, sans-serif" font-size="14" text-anchor="middle">Kairouan → Tunis</text>
    <text x="100" y="225" fill="rgba(255,255,255,0.6)" font-family="Arial, Helvetica, sans-serif" font-size="14" text-anchor="middle">القيروان ← سوسة</text>
    <text x="100" y="250" fill="rgba(255,255,255,0.6)" font-family="Arial, Helvetica, sans-serif" font-size="14" text-anchor="middle">Kairouan → Sousse</text>
  </g>
  
  <!-- Bottom bar -->
  <rect x="0" y="580" width="1200" height="50" fill="rgba(0,0,0,0.3)"/>
  <text x="600" y="612" fill="rgba(255,255,255,0.8)" font-family="Arial, Helvetica, sans-serif" font-size="16" text-anchor="middle">soretrak.onrender.com | +216 77 300 011 | القيروان، تونس</text>
  
  <!-- Republic of Tunisia text -->
  <text x="80" y="560" fill="rgba(255,255,255,0.5)" font-family="Arial, Helvetica, sans-serif" font-size="14">جمهورية تونس - وزارة النقل | République Tunisienne - Ministère des Transports</text>
</svg>
